<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>micron</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>micron</h1>
    <span id="model-info">connecting…</span>
    <button id="theme-toggle" title="Toggle theme">☀️</button>
  </header>
  <div id="chat">
    <div class="msg system">Send a message to start chatting. You can also upload files.</div>
  </div>
  <div id="input-bar">
    <label id="file-label" for="file-input">📎 Upload</label>
    <input type="file" id="file-input" />
    <span id="file-name"></span>
    <input type="text" id="input" placeholder="Type a message…" autofocus />
    <button id="send-btn">Send</button>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>

# micron configuration
# All settings can be overridden by CLI args or environment variables

# Default provider (must match a key under `providers:`)
default_provider: lmstudio

# Context directory (skills, memory, knowledge, persona)
context_dir: context

# Working directory for file tools (resolve relative paths against this)
workdir: /home/matt/Documents/micron/

# Generation settings
temperature: 0.1
max_tokens: 10000
max_tool_iterations: 10

# Server settings
host: 0.0.0.0
port: 8000

# Firecrawl settings (for web_search and fetch_url tools)
firecrawl_url: http://localhost:3002

# Provider configurations
providers:
  llamacpp:
    model: models/MiniCPM5-1B-Q8_0.gguf
    n_threads: 8
    n_gpu_layers: 0
    n_ctx: 8192
    chat_format: chatml

  openrouter:
    api_key: <your-openrouter-api-key>
    base_url: https://openrouter.ai/api/v1
    model: openrouter/auto

  lmstudio:
    api_key: no_key
    base_url: http://lmserver:1234/v1
    # model: gemma-4-12b-it-qat
    # model: qwen3.5-9b-deepseek-v4-flash
    # model: qwen/qwen3.5-9b
    model: mistralai/ministral-3-3b
    chat_format: gemmaml

  ollama:
    base_url: http://lmserver:11434
    model: llama3
    chat_format: chatml

  openai:
    api_key: <your-api-key>
    base_url: https://api.openai.com/v1
    model: gpt-4o-mini
    chat_format: chatml